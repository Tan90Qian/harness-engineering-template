name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  # 修复部分环境下 Corepack 签名验证失败问题
  COREPACK_INTEGRITY_KEYS: ''

jobs:
  quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 包管理器（根据项目取消注释） ──

      # pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # yarn（使用 yarn 时取消注释）
      # - name: 配置 Yarn
      #   run: corepack enable && corepack prepare yarn@stable --activate

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'  # 按需改为 'npm' 或 'yarn'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # ── 质量门禁 ──

      - name: 类型检查
        run: pnpm typecheck

      - name: 代码规范检查
        run: pnpm lint

      - name: 格式检查
        run: pnpm format:check

      - name: 单元测试
        run: pnpm test

      - name: 文档同步检查
        run: node scripts/doc-sync-check.js --strict
        if: github.event_name == 'pull_request'
